<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Expediente Clínico</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
    <h1 class="logo-container">
        <img src="img/logocorto.png" alt="Vida Sana" class="logo-navbar">Vida Sana
    </h1>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="especialidades.html">Especialidades</a>
        <a href="Doctores.html">Médicos</a>
        <a href="citas.html">Citas</a>
    </nav>
</header>
<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f4f7fb;
}

.navbar {
    background: #0a3d62;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.section {
    margin-bottom: 25px;
}

.section h3 {
    border-left: 5px solid #0d6efd;
    padding-left: 10px;
    margin-bottom: 15px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.row {
    display: flex;
    gap: 10px;
}

.row input, .row select {
    flex: 1;
}

button {
    width: 100%;
    padding: 12px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0b5ed7;
}.logo-container {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 24px;
}

.logo-navbar {
    width: 40px; /* ajusta tamaño */
    height: 40px;
    object-fit: contain;
}
</style>
</head>

<body>

<div class="container">
    <h2>Expediente Clínico del Paciente</h2>

    <form id="formExpediente">

<div class="section">
    <h3>Datos Personales</h3>

    <input type="text" id="nombre" placeholder="Nombre completo" required>

    <div class="row">
        <input type="number" id="edad" placeholder="Edad" required>

        <select id="sexo" required>
            <option value="">Sexo</option>
            <option>Masculino</option>
            <option>Femenino</option>
            <option>Otro</option>
        </select>
    </div>

    <div class="row">
        <input type="date" id="fechaNacimiento" required>
        <input type="text" id="curp" placeholder="CURP">
    </div>

    <input type="tel" id="telefono" placeholder="Teléfono">
    <input type="text" id="direccion" placeholder="Dirección">
</div>

<div class="section">
    <h3>Información Médica</h3>
    <textarea id="motivo" placeholder="Motivo de consulta"></textarea>
    <textarea id="historial" placeholder="Historial clínico"></textarea>
    <textarea id="alergias" placeholder="Alergias"></textarea>
    <textarea id="medicamentos" placeholder="Medicamentos actuales"></textarea>
</div>

<div class="section">
    <h3>Signos Vitales</h3>
    <div class="row">
        <input type="text" id="peso" placeholder="Peso (kg)">
        <input type="text" id="altura" placeholder="Altura (cm)">
    </div>
    <div class="row">
        <input type="text" id="presion" placeholder="Presión arterial">
        <input type="text" id="frecuencia" placeholder="Frecuencia cardiaca">
    </div>
</div>

<button type="submit">Guardar Expediente</button>
</form>
